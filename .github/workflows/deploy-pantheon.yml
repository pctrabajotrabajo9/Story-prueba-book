name: Deploy Storybook → Pantheon dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Lo mismo que hiciste en local ──────────────────

      - name: npm ci
        run: npm ci

      - name: build:tailwind
        run: npm run build:tailwind

      - name: build-storybook
        run: npm run build-storybook

      # ── SSH para conectar con Pantheon ─────────────────

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PANTHEON_SSH_KEY }}

      - name: Add Pantheon to known_hosts
        run: |
          ssh-keyscan -p 2222 \
            codeserver.dev.${{ secrets.PANTHEON_SITE_ID }}.drush.in \
            >> ~/.ssh/known_hosts

      # ── Clonar repo Pantheon (igual que hiciste tú) ────

      - name: Clonar repo Pantheon
        run: |
          git clone \
            ssh://codeserver.dev.${{ secrets.PANTHEON_SITE_ID }}@codeserver.dev.${{ secrets.PANTHEON_SITE_ID }}.drush.in:2222/~/repository.git \
            pantheon-repo

      # ── Copiar build (igual que el cp que hiciste) ─────

      - name: Copiar Storybook al repo Pantheon
        run: |
          rm -rf pantheon-repo/web/storybook-static
          cp -r storybook-static pantheon-repo/web/storybook-static

      # ── Commit y push (igual que el git push que hiciste)

      - name: Push a Pantheon
        working-directory: pantheon-repo
        run: |
          git config user.email "ci@tuproyecto.com"
          git config user.name "GitHub Actions"
          git add web/storybook-static
          git commit -m "deploy: storybook [$(date +'%Y-%m-%d %H:%M UTC')]" || true
          git push origin master

      # ── Limpiar cache (igual que el terminus que hiciste)

      - name: Instalar Terminus
        run: |
          curl -O https://raw.githubusercontent.com/pantheon-systems/terminus-installer/master/builds/installer.phar
          php installer.phar install

      - name: Clear cache Pantheon
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="$PANTHEON_MACHINE_TOKEN"
          terminus env:clear-cache ${{ secrets.PANTHEON_SITE_NAME }}.dev