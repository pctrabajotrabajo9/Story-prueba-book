name: Deploy Storybook → Pantheon dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      - name: build:tailwind
        run: npm run build:tailwind

      - name: build-storybook
        run: npm run build-storybook

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PANTHEON_SSH_KEY }}

      - name: Add Pantheon to known_hosts
        run: |
          ssh-keyscan -p 2222 \
            codeserver.dev.${{ secrets.PANTHEON_SITE_ID }}.drush.in \
            >> ~/.ssh/known_hosts

      - name: Instalar Terminus
        run: |
          TERMINUS_VERSION=$(curl -s https://api.github.com/repos/pantheon-systems/terminus/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -L "https://github.com/pantheon-systems/terminus/releases/download/${TERMINUS_VERSION}/terminus.phar" \
            --output terminus.phar
          chmod +x terminus.phar
          sudo mv terminus.phar /usr/local/bin/terminus
          terminus --version

      - name: ✅ Verificar site prueba-storybook1
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus auth:login --machine-token="$PANTHEON_MACHINE_TOKEN"

          SITE=$(terminus site:info prueba-storybook1 --field=name 2>/dev/null || echo "NOT_FOUND")

          if [ "$SITE" != "prueba-storybook1" ]; then
            echo "❌ ABORTADO: site incorrecto ($SITE). No se hará push."
            exit 1
          fi

          echo "✅ Site confirmado: $SITE"

      - name: Clonar repo Pantheon
        run: |
          git clone \
            ssh://codeserver.dev.${{ secrets.PANTHEON_SITE_ID }}@codeserver.dev.${{ secrets.PANTHEON_SITE_ID }}.drush.in:2222/~/repository.git \
            pantheon-repo
          cd pantheon-repo
          git checkout master

      - name: Copiar Storybook al repo Pantheon
        run: |
          rm -rf pantheon-repo/web/storybook-static
          cp -r storybook-static pantheon-repo/web/storybook-static

      - name: Push a Pantheon
        working-directory: pantheon-repo
        run: |
          git config user.email "ci@prueba-storybook1.com"
          git config user.name "GitHub Actions"
          git add web/storybook-static
          git commit -m "deploy: storybook [$(date +'%Y-%m-%d %H:%M UTC')]" || true
          git push origin master

      - name: Clear cache Pantheon
        env:
          PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
        run: |
          terminus env:clear-cache prueba-storybook1.dev